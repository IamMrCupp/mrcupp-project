{{ define "main" }}
<header class="page-header">
  <div class="section-wrap">
    <h1 class="page-title">{{ .Title }}</h1>
  </div>
</header>

<div class="list-wrap">
  <div class="section-wrap">
    <div class="terms-list">
      {{ range $key, $taxonomy := .Data.Terms.ByCount }}
      <a href="{{ .Page.RelPermalink }}">{{ .Page.Title }} <span class="accent">{{ .Count }}</span></a>
      {{ end }}
    </div>
  </div>
</div>
{{ end }}
